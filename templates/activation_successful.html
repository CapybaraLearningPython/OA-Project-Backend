<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>账户激活成功</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1f2d3d;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #fff;
        }

        .card {
            background: #fff;
            color: #1f2d3d;
            width: 420px;
            padding: 40px 32px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
            text-align: center;
        }

        .title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .desc {
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 24px;
            color: #4a5a6a;
        }

        .btn {
            display: inline-block;
            padding: 10px 18px;
            background-color: #1f2d3d;
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            font-size: 14px;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .footer {
            margin-top: 18px;
            font-size: 12px;
            color: #9aa7b2;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="title">账户激活成功</div>
        <div class="desc">
            你的 OA 系统账户已成功激活，可以使用账号登录系统。
        </div>

        <a class="btn" href="http://localhost:5173/#/login">进入登录页面</a>

        <div class="footer">
            如无法跳转，请联系系统管理员
        </div>
    </div>
</body>
</html>
